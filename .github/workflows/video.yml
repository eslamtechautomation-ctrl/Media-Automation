name: Trend Tech Reels Creator (Smart Memory)

on:
  schedule:
    - cron: '0 */3 * * *' # هيشتغل كل 3 ساعات أوتوماتيك
  workflow_dispatch: # زرار التشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    # إضافة صلاحيات الكتابة للـ Action عشان يقدر يعمل Push للملف
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests feedparser groq gTTS
          pip install "Pillow<10.0.0"
          pip install moviepy==1.0.3

      - name: Create and Upload Reel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python video_creator.py

      - name: Commit and Push Memory File
        run: |
          git config --global user.name "TrendTech-Bot"
          git config --global user.email "bot@trendtech.com"
          git add posted_reels.json
          # هيعمل كوميت بس لو الملف اتغير فعلاً (يعني لو فيه فيديو اتنشر جديد)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update memory: Added new posted reel" && git push)
