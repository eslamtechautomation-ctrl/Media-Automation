name: Trend Tech Reels Creator

on:
  schedule:
    - cron: '0 10 * * *' # هيشتغل الساعة 12 ضهراً بتوقيت مصر
  workflow_dispatch: # زرار التشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # خطوة حرجة: السماح لـ ImageMagick باستخدام الخطوط وكتابة النصوص
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Libraries
        run: |
          pip install requests feedparser groq gTTS
          pip install "Pillow<10.0.0" # لإصلاح مشكلة ANTIALIAS
          pip install moviepy==1.0.3

      - name: Create and Upload Reel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python video_creator.py
